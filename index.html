<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de prueba</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f7fa;
      color: #1f2937;
    }
    header {
      background: #2563eb;
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }
    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .code {
      background: #111827;
      color: #f8fafc;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Prueba de servidor GitHub Pages</h1>
    <p>Esta es una página de prueba generada para ver tu sitio en el servidor.</p>
  </header>
  <main>
    <h2>Bienvenido</h2>
    <p>Si estás viendo esta página, el servidor está funcionando correctamente.</p>
    <ul>
      <li>Fecha actual: <strong id="fecha"></strong></li>
      <li>Repositorio: <strong>raycososa.github.io</strong></li>
      <li>Archivo de prueba: <strong>index.html</strong></li>
    </ul>
  </main>

  <script>
    document.getElementById('fecha').textContent = new Date().toLocaleString('es-ES');

    (function(){
      const targetUrl = 'https://www.gobiernodecanarias.org/educacion/6/dgper/opoperdocprimweb/scripts/publicaciones/apipublicaciones.asp?codtribunal=89&idpublicacion=31&tipo=resultado&tipotribunal=J&op=157&cuerpo=11&especialidad=72&idTipoPubPadre=0';

      function tryParseJSON(text){
        try{ return JSON.parse(text); }catch(e){ return null; }
      }

      function extractObjectNear(text, pos){
        // busca '{' antes de pos
        let start = text.lastIndexOf('{', pos);
        if(start === -1) start = text.indexOf('{');
        if(start === -1) return null;
        // encontrar cierre correspondiente con contador de llaves
        let depth = 0;
        for(let i = start; i < text.length; i++){
          const ch = text[i];
          if(ch === '{') depth++;
          else if(ch === '}') depth--;
          if(depth === 0){
            const candidate = text.slice(start, i+1);
            const json = tryParseJSON(candidate);
            if(json) return json;
            break;
          }
        }
        return null;
      }

      async function fetchWithFallback(url){
        const proxies = [
          (u)=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
          (u)=>`https://corsproxy.io/?${encodeURIComponent(u)}`
        ];

        // intenta fetch directo primero
        try{
          const res = await fetch(url, { mode: 'cors' });
          if(res && (res.status === 0 || (res.status >= 200 && res.status < 400))){
            return {res, usedProxy: false};
          }
        }catch(e){
          console.warn('Direct fetch falló, intentando proxies...', e);
        }

        // probar proxies en orden
        for(const p of proxies){
          const proxyUrl = p(url);
          try{
            const res = await fetch(proxyUrl);
            if(res && (res.status >= 200 && res.status < 400)){
              return {res, usedProxy: true, proxyUrl};
            }
          }catch(e){
            console.warn('Proxy falló:', proxyUrl, e);
          }
        }
        throw new Error('No se pudo obtener la URL, ni directo ni por proxy');
      }

      async function fetchAndAnalyze(url){
        try{
          const {res, usedProxy, proxyUrl} = await fetchWithFallback(url);
          const ct = res.headers.get ? (res.headers.get('content-type')||'') : '';
          const text = await res.text();
          const found = /sigrid/i.test(text);

          const out = document.getElementById('sigrid-result');
          if(out) out.textContent = found + (usedProxy ? ' (proxy)' : '');
          if(usedProxy){
            const proxyNotice = document.getElementById('sigrid-proxy-notice') || document.createElement('div');
            proxyNotice.id = 'sigrid-proxy-notice';
            proxyNotice.style.fontSize = '0.9rem';
            proxyNotice.style.color = '#374151';
            proxyNotice.textContent = `Respuesta obtenida vía proxy: ${proxyUrl}`;
            document.getElementById('sigrid-container').appendChild(proxyNotice);
          }

          if(!found){
            updateDetails('No se encontró "Sigrid" en la respuesta.');
            console.log('Sigrid no encontrada');
            return false;
          }

          if(ct.includes('application/json')){
            try{
              const json = JSON.parse(text);
              updateDetails(json);
              window.getSigridInfo = () => json;
              return true;
            }catch(e){
              // seguir con extracción
            }
          }

          const m = text.match(/sigrid/i);
          const pos = m ? m.index : Math.floor(text.length/2);
          const jsonExtract = extractObjectNear(text, pos);
          if(jsonExtract){
            updateDetails(jsonExtract);
            window.getSigridInfo = () => jsonExtract;
            return true;
          }

          const snippet = text.substring(Math.max(0, pos-200), Math.min(text.length, pos+200));
          updateDetails(snippet);
          window.getSigridInfo = () => snippet;
          return true;
        }catch(err){
          console.error('Error fetching URL:', err);
          updateDetails('Error al obtener la URL (posible CORS o red).');
          const out = document.getElementById('sigrid-result');
          if(out) out.textContent = 'false (error)';
          return false;
        }
      }

      function updateDetails(data){
        let details = document.getElementById('sigrid-details');
        if(!details){
          details = document.createElement('pre');
          details.id = 'sigrid-details';
          details.style.background = '#f3f4f6';
          details.style.padding = '1rem';
          details.style.borderRadius = '8px';
          details.style.overflowX = 'auto';
          const container = document.getElementById('sigrid-container') || null;
          if(container) container.appendChild(details);
          else document.querySelector('main').appendChild(details);
        }
        if(typeof data === 'object'){
          details.textContent = JSON.stringify(data, null, 2);
        }else{
          details.textContent = String(data);
        }
      }

      // Añadir UI de resultado
      const container = document.createElement('div');
      container.id = 'sigrid-container';
      container.style.marginTop = '1rem';
      container.innerHTML = `<h3>Comprobación de la URL</h3>
        <p>URL: <a href="${targetUrl}" target="_blank" rel="noopener">${targetUrl}</a></p>
        <p>Resultado: <strong id="sigrid-result">comprobando...</strong></p>
        <p><button id="recheck">Volver a comprobar</button></p>`;
      document.querySelector('main').appendChild(container);

      document.getElementById('recheck').addEventListener('click', () => {
        document.getElementById('sigrid-result').textContent = 'comprobando...';
        updateDetails('');
        fetchAndAnalyze(targetUrl);
      });

      // Ejecutar al cargarse
      fetchAndAnalyze(targetUrl);

      // Exponer para uso en consola: window.fetchAndAnalyze(url) y window.getSigridInfo()
      window.fetchAndAnalyze = fetchAndAnalyze;
      window.getSigridInfo = () => null;
    })();
  </script>
</body>
</html>
